spring.application.name=APIGateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=address-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://address
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/address/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST
spring.cloud.gateway.server.webflux.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.name=addressCircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.fallbackUri=forward:/fallback/address

spring.cloud.gateway.server.webflux.routes[1].id=employee-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://employees
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/employees/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST
spring.cloud.gateway.server.webflux.routes[1].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.name=employeeCircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.fallbackUri=forward:/fallback/employee

spring.cloud.gateway.server.webflux.routes[2].id=worklocation-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://worklocation
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/worklocation/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST
spring.cloud.gateway.server.webflux.routes[2].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[2].filters[1].args.name=workLocationCircuitBreaker
spring.cloud.gateway.server.webflux.routes[2].filters[1].args.fallbackUri=forward:/fallback/worklocation

resilience4j.circuitbreaker.instances.addressCircuitBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.addressCircuitBreaker.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.addressCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.addressCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.employeeCircuitBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.employeeCircuitBreaker.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.employeeCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.employeeCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.workLocationCircuitBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.workLocationCircuitBreaker.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.workLocationCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.workLocationCircuitBreaker.wait-duration-in-open-state=10s
