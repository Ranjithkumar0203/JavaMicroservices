spring.application.name=APIGateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=address-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://address
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/address/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST

spring.cloud.gateway.server.webflux.routes[1].id=employee-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://employees
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/employees/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST

spring.cloud.gateway.server.webflux.routes[2].id=worklocation-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://worklocation
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/worklocation/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST
